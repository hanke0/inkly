# .github/workflows/build.yaml

name: Build

on:
  release:
    types: [created]
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: Swatinem/rust-cache@v1
      - name: Format
        run: cargo fmt --check
      - name: Check
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --no-deps --all-targets -- -D warnings

  build:
    name: Build - ${{ matrix.platform.os-name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os-name: Linux-x86_64-avx
            runs-on: ubuntu-24.04
            RUSTFLAGS: '-C target-cpu=x86-64-v3'
          - os-name: Linux-x86_64-sse
            runs-on: ubuntu-24.04
            RUSTFLAGS: '-C target-cpu=x86-64-v2'
          - os-name: Windows-x86_64
            runs-on: windows-latest
            RUSTFLAGS: ''
          - os-name: macOS-aarch64
            runs-on: macOS-latest
            RUSTFLAGS: ''

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl toolchain (Linux)
        if: contains(matrix.platform.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.platform.target }}

      - name: Test
        run: cargo test --locked --workspace
        env:
          RUSTFLAGS: ${{ matrix.platform.RUSTFLAGS }}

      - name: Build
        run: cargo build --locked --release -p inkly
        env:
          RUSTFLAGS: ${{ matrix.platform.RUSTFLAGS }}

      - name: Strip release binary
        if: runner.os != 'Windows'
        run: strip "target/release/inkly"

      - name: Release artifact paths
        id: art
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "path=target/release/inkly.exe" >> "$GITHUB_OUTPUT"
            echo "name=inkly-${{ matrix.platform.os-name }}.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=target/release/inkly" >> "$GITHUB_OUTPUT"
            echo "name=inkly-${{ matrix.platform.os-name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: inkly-${{ matrix.platform.os-name }}
          path: ${{ steps.art.outputs.path }}

      - name: Publish artifacts and release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.art.outputs.path }}
          asset_name: ${{ steps.art.outputs.name }}
          tag: ${{ github.ref_name }}
          overwrite: true

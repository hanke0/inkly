# .github/workflows/build.yaml

name: Build

on:
  release:
    types: [created]
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lints:
    name: Lints
    # Match Linux build runners (ubuntu-22.04 / glibc ~2.35) so rust-cache never
    # restores target/ artifacts built on ubuntu-latest (glibc 2.39+).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-lints-ubuntu-22.04
      - name: Format
        run: cargo fmt --check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend format
        run: cd frontend && npm ci && npm run fmt:check
      - name: Clippy
        run: cargo clippy --no-deps --all-targets -- -D warnings

  build:
    name: Build - ${{ matrix.platform.os-name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Jammy glibc ~2.35; Debian 12 (bookworm) ships glibc 2.36, so CI-built
          # Linux binaries run there. 24.04 targets glibc 2.38+ and breaks bookworm.
          - os-name: Linux-x86_64-avx
            runs-on: ubuntu-22.04
            RUSTFLAGS: '-C target-cpu=x86-64-v3'
          - os-name: Linux-x86_64-sse
            runs-on: ubuntu-22.04
            RUSTFLAGS: '-C target-cpu=x86-64-v2'
          - os-name: Windows-x86_64
            runs-on: windows-latest
            RUSTFLAGS: ''
          - os-name: macOS-aarch64
            runs-on: macOS-latest
            RUSTFLAGS: ''

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Include runs-on so caches from ubuntu-latest (newer glibc) are never
          # restored on ubuntu-22.04 (breaks build-script binaries e.g. llama-cpp-sys-2).
          prefix-key: v1-rust-${{ matrix.platform.runs-on }}
          shared-key: ${{ matrix.platform.os-name }}

      - name: Test
        run: cargo test --locked --workspace
        env:
          RUSTFLAGS: ${{ matrix.platform.RUSTFLAGS }}

      - name: Build
        run: cargo build --locked --release -p inkly
        env:
          RUSTFLAGS: ${{ matrix.platform.RUSTFLAGS }}

      - name: Strip release binary
        if: runner.os != 'Windows'
        run: strip "target/release/inkly"

      - name: Release artifact paths
        id: art
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "path=target/release/inkly.exe" >> "$GITHUB_OUTPUT"
            echo "name=inkly-${{ matrix.platform.os-name }}.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=target/release/inkly" >> "$GITHUB_OUTPUT"
            echo "name=inkly-${{ matrix.platform.os-name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: inkly-${{ matrix.platform.os-name }}
          path: ${{ steps.art.outputs.path }}

      - name: Publish artifacts and release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.art.outputs.path }}
          asset_name: ${{ steps.art.outputs.name }}
          tag: ${{ github.ref_name }}
          overwrite: true

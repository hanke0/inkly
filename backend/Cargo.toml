[package]
name = "inkly"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.8", features = ["macros"] }
dotenvy = "0.15.7"
jsonwebtoken = "10.3.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tower-http = { version = "0.6.8", features = ["trace", "request-id", "limit"] }
tower_governor = { version = "0.8.0", features = ["axum"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"

inkly-contract = { path = "../crates/inkly-contract" }
inkly-search = { path = "../crates/inkly-search" }
include_dir = "0.7.4"
mime_guess = "2.0.5"
